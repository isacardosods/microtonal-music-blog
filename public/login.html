<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/login.css">

    <script src="./js/windows.js"></script>
    <script src="./js/login.js"></script>
    <script src="./js/sessao.js"></script>

    <title>Entretons | Login</title>
</head>

<body>
    <header>
        <nav>
            <div class="logo">
                <span>Entretons</span>
            </div>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="sobre.html">Sobre</a></li>
                <li><a href="#">Artistas</a></li>
                <button onclick="mudarJanela('./login.html')">Login</button>
            </ul>
        </nav>
    </header>

    <main>
        <div class="alerta_erro">
            <div class="card_erro" id="cardErro">
                <span id="mensagem_erro"></span>
            </div>
        </div>
        <div class="text-container">
            <span>Bem-vindo(a) de volta!</span>
            <p>Preencha as informações abaixo para prosseguir com seu login</p>
        </div>
        <div class="form-container">

            <div class="form">
                <span>Email:</span>
                <input  id="email_input" type="text" placeholder="Digite seu email...">

                <span>Senha:</span>
                <input id="senha_input" type="password" placeholder="Digite sua senha...">

                <div class="btn">
                    <button onclick="entrar()">Entrar</button>
                </div>

                <div class="direcionamento-cadastro">
                    <span class="span-cadastro">Não tem uma conta?</span>
                    <span class="link-cadastro span-cadastro"><a href="./cadastro.html">Cadastre-se</a></span>
                </div>

                <div id="div_aguardar" class="loading-div">
                    <img src="./assets/aguarde-orange.gif" id="loading-gif">
                </div>

                <div id="div_erros_login"></div>
            </div>
        </div>
    </main>

    <footer>
        <div>
            <span>© 2026 Isabella Cardoso dos Santos | Todos os direitos reservados. </span>
        </div>
    </footer>
</body>

</html>
