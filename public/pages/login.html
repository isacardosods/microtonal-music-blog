<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/forms.css">
    <title>Entretons | Login</title>
</head>
<body>
    <header>
        <nav>
            <div class="logo">
                <span>Entretons</span>
            </div>
            <ul>
                <li><a href="./index.html">Home</a></li>
                <li><a href="./sobre.html">Sobre</a></li>
                <li><a href="#">Artistas</a></li>
                <button onclick="janelaLogin()" id="btn-login">Login</button>
            </ul>
        </nav>
    </header>

    <main>
        <div class="text-container">
            <span>Bem-vindo(a) de volta!</span>
            <p>Preencha as informações abaixo para prosseguir com seu login</p>
        </div>
        <div class="form-container">
            <form action="">
                <span>Email:</span>
                <input type="text" placeholder="Digite seu email...">

                <span>Senha:</span>
                <input type="text" placeholder="Digite sua senha...">   

                <div class="btn">
                    <button type="submit">Entrar</button>
                </div>

                <div class="direcionamento-cadastro">
                    <span class="span-cadastro">Não tem uma conta?</span><span class="link-cadastro span-cadastro"><a href="">Cadastre-se</a></span>
                </div>
            </form>
        </div>
    </main>

    <footer>
        <div>
            <span>© 2026 Isabella Cardoso dos Santos | Todos os direitos reservados. </span>
        </div>
    </footer>
</body>
